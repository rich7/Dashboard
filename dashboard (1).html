<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Persoonlijk Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.2/Sortable.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --bg2: #181b24;
    --bg3: #1e2130;
    --bg4: #252840;
    --accent: #6c8fff;
    --accent2: #a78bfa;
    --accent3: #34d399;
    --text: #e8eaf0;
    --text2: #9aa0b8;
    --text3: #5a6080;
    --border: #2a2f47;
    --border2: #353a58;
    --danger: #f87171;
    --warning: #fbbf24;
    --radius: 10px;
    --radius2: 14px;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --shadow: 0 2px 16px rgba(0,0,0,0.35);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .logo { font-size: 16px; font-weight: 600; color: var(--accent); letter-spacing: -0.3px; }

  /* ── Tabs ── */
  .tabs { display: flex; gap: 4px; }
  .tab {
    padding: 6px 16px;
    border-radius: 7px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text2);
    font-family: var(--font);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .tab:hover { color: var(--text); background: var(--bg3); }
  .tab.active { background: var(--bg4); border-color: var(--border2); color: var(--text); }

  .header-right { display: flex; align-items: center; gap: 10px; }

  #datetime-mini {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text3);
    text-align: right;
    line-height: 1.4;
  }

  /* ── Main ── */
  .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Widget Row ── */
  .widget-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }

  .widget-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius2);
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .widget-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .widget-label {
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 500;
    margin-bottom: 8px;
  }

  /* Clock */
  #clock-time {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: 2px;
  }
  #clock-date {
    font-size: 12px;
    color: var(--text2);
    margin-top: 4px;
  }

  /* Timer */
  #timer-display {
    font-family: var(--mono);
    font-size: 26px;
    color: var(--text);
    letter-spacing: 2px;
  }
  .timer-btns { display: flex; gap: 6px; margin-top: 10px; }
  .btn-xs {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text2);
    font-size: 11px;
    font-family: var(--font);
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-xs:hover { color: var(--text); border-color: var(--accent); }
  .btn-xs.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  #timer-preset { font-size: 11px; color: var(--text3); margin-top: 6px; }
  .preset-btn {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 11px;
    font-family: var(--font);
    padding: 0 4px;
    text-decoration: underline;
    text-underline-offset: 2px;
  }
  .preset-btn:hover { color: var(--accent2); }

  /* Calendar */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .cal-nav {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 6px;
    border-radius: 4px;
    transition: color 0.15s;
  }
  .cal-nav:hover { color: var(--text); }
  #cal-month-label { font-size: 13px; font-weight: 500; color: var(--text); }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    text-align: center;
  }
  .cal-dow { font-size: 9px; color: var(--text3); font-weight: 500; letter-spacing: 0.5px; padding: 2px 0 4px; }
  .cal-day {
    font-size: 11px;
    padding: 3px 2px;
    border-radius: 4px;
    color: var(--text2);
    cursor: default;
    transition: background 0.1s;
  }
  .cal-day.other-month { color: var(--text3); }
  .cal-day.today {
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    border-radius: 6px;
  }
  .cal-day:not(.today):hover { background: var(--bg3); color: var(--text); }

  /* Weather */
  #weather-main { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  #weather-icon { font-size: 28px; }
  #weather-temp { font-size: 28px; font-weight: 500; color: var(--text); }
  #weather-desc { font-size: 13px; color: var(--text2); }
  #weather-loc { font-size: 11px; color: var(--text3); margin-top: 2px; }
  #weather-details { display: flex; gap: 12px; margin-top: 8px; }
  .weather-detail { font-size: 11px; color: var(--text2); }
  .weather-detail span { color: var(--text3); }
  #weather-loading { font-size: 13px; color: var(--text3); }
  #weather-error { font-size: 12px; color: var(--danger); }

  /* ── Link Blocks Grid ── */
  .blocks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  .link-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius2);
    overflow: hidden;
    transition: border-color 0.15s;
  }
  .link-block:hover { border-color: var(--border2); }

  .drag-handle {
    cursor: grab;
    color: var(--text3);
    font-size: 12px;
    padding: 0 4px 0 0;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.15s;
    user-select: none;
    line-height: 1;
  }
  .drag-handle:active { cursor: grabbing; }
  .link-block:hover .drag-handle { opacity: 1; }
  .link-block.sortable-chosen { opacity: 0.85; box-shadow: 0 8px 32px rgba(0,0,0,0.5); border-color: var(--accent) !important; }
  .link-block.sortable-ghost { opacity: 0.3; }
  .blocks-grid.drag-active .link-block:not(.sortable-chosen) { border-style: dashed; }

  .block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px 8px;
    border-bottom: 1px solid var(--border);
    background: var(--bg3);
  }
  .block-title-wrap { display: flex; align-items: center; gap: 8px; flex: 1; min-width: 0; }
  .block-emoji { font-size: 14px; flex-shrink: 0; }
  .block-title {
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.2px;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .block-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .btn-icon {
    background: none;
    border: 1px solid transparent;
    color: var(--text3);
    cursor: pointer;
    font-size: 11px;
    font-family: var(--font);
    padding: 3px 8px;
    border-radius: 5px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn-icon:hover { color: var(--text); border-color: var(--border2); background: var(--bg4); }
  .btn-icon.open-all { color: var(--accent); }
  .btn-icon.open-all:hover { border-color: var(--accent); background: rgba(108,143,255,0.1); }
  .btn-icon.edit-btn:hover { border-color: var(--border2); }

  .block-links { padding: 6px 0; }

  .link-item {
    display: flex;
    align-items: center;
    padding: 5px 14px;
    gap: 8px;
    text-decoration: none;
    color: var(--text2);
    font-size: 13px;
    transition: all 0.12s;
    border-radius: 4px;
    margin: 1px 6px;
  }
  .link-item:hover { background: var(--bg3); color: var(--text); }
  .link-item-favicon { width: 14px; height: 14px; border-radius: 2px; flex-shrink: 0; opacity: 0.8; }
  .link-item-name { flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .add-first-link {
    padding: 10px 14px;
    font-size: 12px;
    color: var(--text3);
    font-style: italic;
    text-align: center;
  }

  /* ── Add Block ── */
  .add-block-btn {
    background: var(--bg2);
    border: 1px dashed var(--border2);
    border-radius: var(--radius2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 28px 14px;
    color: var(--text3);
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .add-block-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,143,255,0.04); }

  /* ── Notes ── */
  .notes-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .note-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius2);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .note-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg3);
    border-bottom: 1px solid var(--border);
  }
  .note-title-input {
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    font-weight: 600;
    flex: 1;
    outline: none;
    min-width: 0;
  }
  .note-title-input::placeholder { color: var(--text3); }
  .note-textarea {
    flex: 1;
    background: none;
    border: none;
    color: var(--text2);
    font-family: var(--font);
    font-size: 13px;
    padding: 12px 14px;
    outline: none;
    resize: none;
    min-height: 120px;
    line-height: 1.6;
  }
  .note-textarea::placeholder { color: var(--text3); }
  .note-footer {
    padding: 6px 14px;
    font-size: 10px;
    color: var(--text3);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .btn-del-note {
    background: none;
    border: none;
    color: var(--text3);
    cursor: pointer;
    font-size: 11px;
    font-family: var(--font);
    padding: 2px 6px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .btn-del-note:hover { color: var(--danger); background: rgba(248,113,113,0.1); }
  .add-note-btn {
    background: var(--bg2);
    border: 1px dashed var(--border2);
    border-radius: var(--radius2);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 28px 14px;
    color: var(--text3);
    cursor: pointer;
    font-size: 13px;
    font-family: var(--font);
    transition: all 0.15s;
  }
  .add-note-btn:hover { border-color: var(--accent3); color: var(--accent3); background: rgba(52,211,153,0.04); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 500;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.hidden { display: none; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { font-size: 14px; font-weight: 600; color: var(--text); }
  .modal-close {
    background: none; border: none; color: var(--text2); cursor: pointer;
    font-size: 18px; line-height: 1; padding: 4px;
    transition: color 0.15s;
  }
  .modal-close:hover { color: var(--text); }

  .modal-body { padding: 16px 20px; overflow-y: auto; flex: 1; }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; color: var(--text2); margin-bottom: 5px; font-weight: 500; letter-spacing: 0.4px; }
  .form-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input::placeholder { color: var(--text3); }

  .link-edit-list { margin-top: 6px; }
  .link-edit-item {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 8px;
    padding: 6px 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .link-edit-item input {
    flex: 1;
    background: none;
    border: none;
    color: var(--text);
    font-family: var(--font);
    font-size: 12px;
    outline: none;
    min-width: 0;
  }
  .link-edit-item input::placeholder { color: var(--text3); }
  .link-edit-item input:first-child { max-width: 110px; border-right: 1px solid var(--border); padding-right: 6px; }
  .btn-del-link {
    background: none; border: none; color: var(--text3); cursor: pointer;
    font-size: 14px; line-height: 1; padding: 2px 4px; border-radius: 3px;
    transition: color 0.15s;
  }
  .btn-del-link:hover { color: var(--danger); }

  .btn-add-link {
    width: 100%; padding: 7px; border-radius: var(--radius);
    background: none; border: 1px dashed var(--border2);
    color: var(--text3); cursor: pointer; font-size: 12px; font-family: var(--font);
    transition: all 0.15s; margin-bottom: 4px;
  }
  .btn-add-link:hover { color: var(--accent); border-color: var(--accent); }

  .modal-footer {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
  }
  .btn-cancel {
    padding: 7px 16px; border-radius: var(--radius); border: 1px solid var(--border2);
    background: none; color: var(--text2); cursor: pointer; font-size: 13px; font-family: var(--font);
    transition: all 0.15s;
  }
  .btn-cancel:hover { color: var(--text); background: var(--bg3); }
  .btn-save {
    padding: 7px 18px; border-radius: var(--radius); border: none;
    background: var(--accent); color: #fff; cursor: pointer; font-size: 13px; font-weight: 500; font-family: var(--font);
    transition: opacity 0.15s;
  }
  .btn-save:hover { opacity: 0.85; }
  .btn-danger {
    padding: 7px 14px; border-radius: var(--radius); border: 1px solid rgba(248,113,113,0.3);
    background: none; color: var(--danger); cursor: pointer; font-size: 12px; font-family: var(--font);
    transition: all 0.15s; margin-right: auto;
  }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }

  .section-title {
    font-size: 10px;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--text3);
    font-weight: 500;
    margin-bottom: 10px;
    margin-top: 6px;
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">⬡ Dashboard</div>
    <div class="tabs" id="tab-bar">
      <button class="tab active" data-tab="0">Favorieten + Widgets</button>
      <button class="tab" data-tab="1">Favorieten</button>
      <button class="tab" data-tab="2">Notities</button>
    </div>
  </div>
  <div class="header-right">
    <div id="datetime-mini"></div>
  </div>
</div>

<div class="main">

  <!-- TAB 0: Links + Widgets -->
  <div class="tab-panel active" id="panel-0">
    <div class="widget-row">

      <!-- Clock -->
      <div class="widget-card" id="clock-widget">
        <div class="widget-label">Klok</div>
        <div id="clock-time">00:00:00</div>
        <div id="clock-date"></div>
      </div>

      <!-- Timer -->
      <div class="widget-card" id="timer-widget">
        <div class="widget-label">Timer</div>
        <div id="timer-display">00:00</div>
        <div class="timer-btns">
          <button class="btn-xs" id="timer-start">▶ Start</button>
          <button class="btn-xs" id="timer-pause">⏸ Pauze</button>
          <button class="btn-xs" id="timer-reset">↺ Reset</button>
        </div>
        <div id="timer-preset">
          Snel:
          <button class="preset-btn" onclick="setTimer(5)">5m</button>
          <button class="preset-btn" onclick="setTimer(10)">10m</button>
          <button class="preset-btn" onclick="setTimer(15)">15m</button>
          <button class="preset-btn" onclick="setTimer(25)">25m</button>
          <button class="preset-btn" onclick="setTimer(30)">30m</button>
        </div>
      </div>

      <!-- Calendar -->
      <div class="widget-card" id="cal-widget">
        <div class="widget-label">Kalender</div>
        <div class="cal-header">
          <button class="cal-nav" id="cal-prev">‹</button>
          <span id="cal-month-label"></span>
          <button class="cal-nav" id="cal-next">›</button>
        </div>
        <div class="cal-grid" id="cal-grid"></div>
      </div>

      <!-- Weather -->
      <div class="widget-card" id="weather-widget">
        <div class="widget-label">Weer</div>
        <div id="weather-loading">Locatie ophalen…</div>
        <div id="weather-content" style="display:none">
          <div id="weather-main">
            <span id="weather-icon"></span>
            <span id="weather-temp"></span>
          </div>
          <div id="weather-desc"></div>
          <div id="weather-loc"></div>
          <div id="weather-details">
            <div class="weather-detail"><span>Vochtigheid</span><br id="wh"> </div>
            <div class="weather-detail"><span>Wind</span><br id="ww"> </div>
            <div class="weather-detail"><span>Gevoel</span><br id="wf"> </div>
          </div>
        </div>
        <div id="weather-error" style="display:none"></div>
      </div>

    </div>

    <div class="section-title">Links</div>
    <div class="blocks-grid" id="grid-0"></div>
    <div style="margin-top:14px">
      <button class="add-block-btn" onclick="openAddBlock(0)">＋ Nieuw blok toevoegen</button>
    </div>
  </div>

  <!-- TAB 1: Links only -->
  <div class="tab-panel" id="panel-1">
    <div class="section-title">Links</div>
    <div class="blocks-grid" id="grid-1"></div>
    <div style="margin-top:14px">
      <button class="add-block-btn" onclick="openAddBlock(1)">＋ Nieuw blok toevoegen</button>
    </div>
  </div>

  <!-- TAB 2: Notes -->
  <div class="tab-panel" id="panel-2">
    <div class="section-title">Notities</div>
    <div class="notes-grid" id="notes-grid"></div>
    <div style="margin-top:14px">
      <button class="add-note-btn" onclick="addNote()">＋ Nieuwe notitie</button>
    </div>
  </div>

</div>

<!-- Edit Block Modal -->
<div class="modal-overlay hidden" id="edit-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title-txt">Blok bewerken</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">EMOJI / ICOON</label>
        <input class="form-input" id="edit-emoji" type="text" placeholder="🔗" maxlength="4" style="width:70px">
      </div>
      <div class="form-group">
        <label class="form-label">NAAM BLOK</label>
        <input class="form-input" id="edit-title" type="text" placeholder="Mijn links">
      </div>
      <div class="form-group">
        <label class="form-label">LINKS</label>
        <div class="link-edit-list" id="link-edit-list"></div>
        <button class="btn-add-link" onclick="addLinkRow()">＋ Link toevoegen</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="btn-delete-block" onclick="deleteBlock()">Verwijder blok</button>
      <button class="btn-cancel" onclick="closeModal()">Annuleren</button>
      <button class="btn-save" onclick="saveBlock()">Opslaan</button>
    </div>
  </div>
</div>

<script>
// ─── State ────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'personal_dash_v3';

function defaultData() {
  return {
    tabs: [
      {
        blocks: [
          { id: uid(), emoji:'🔍', title:'Zoeken', links:[
            {name:'Google', url:'https://google.com'},
            {name:'DuckDuckGo', url:'https://duckduckgo.com'},
            {name:'Bing', url:'https://bing.com'},
          ]},
          { id: uid(), emoji:'📰', title:'Nieuws', links:[
            {name:'NU.nl', url:'https://nu.nl'},
            {name:'NOS', url:'https://nos.nl'},
            {name:'RTL Nieuws', url:'https://rtlnieuws.nl'},
          ]},
          { id: uid(), emoji:'📦', title:'Tools', links:[
            {name:'ChatGPT', url:'https://chatgpt.com'},
            {name:'GitHub', url:'https://github.com'},
            {name:'Wikipedia', url:'https://wikipedia.org'},
          ]},
        ]
      },
      {
        blocks: [
          { id: uid(), emoji:'🛒', title:'Winkelen', links:[
            {name:'Bol.com', url:'https://bol.com'},
            {name:'Amazon NL', url:'https://amazon.nl'},
            {name:'Marktplaats', url:'https://marktplaats.nl'},
          ]},
          { id: uid(), emoji:'🏦', title:'Financiën', links:[
            {name:'ING', url:'https://ing.nl'},
            {name:'Belastingdienst', url:'https://belastingdienst.nl'},
          ]},
        ]
      }
    ],
    notes: [
      { id: uid(), title:'Notitie 1', body:'Schrijf hier je aantekeningen…', updated: Date.now() }
    ]
  };
}

function uid() { return Math.random().toString(36).slice(2,9); }

let data = (() => {
  try { const s = localStorage.getItem(STORAGE_KEY); return s ? JSON.parse(s) : defaultData(); }
  catch { return defaultData(); }
})();

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch {} }

// ─── Tabs ──────────────────────────────────────────────────────────────────
let activeTab = 0;
document.getElementById('tab-bar').addEventListener('click', e => {
  const btn = e.target.closest('.tab');
  if (!btn) return;
  activeTab = +btn.dataset.tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', +t.dataset.tab === activeTab));
  document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', i === activeTab));
});

// ─── Render Blocks ─────────────────────────────────────────────────────────
function renderBlocks() {
  data.tabs.forEach((tab, ti) => {
    const grid = document.getElementById('grid-' + ti);
    if (!grid) return;
    grid.innerHTML = '';
    tab.blocks.forEach(block => {
      const div = document.createElement('div');
      div.className = 'link-block';
      div.dataset.id = block.id;

      const links = block.links.map(l => `
        <a class="link-item" href="${esc(l.url)}" target="_blank" rel="noopener">
          <img class="link-item-favicon" src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(l.url)}&sz=32" onerror="this.style.display='none'" loading="lazy">
          <span class="link-item-name">${esc(l.name)}</span>
        </a>`).join('');

      div.innerHTML = `
        <div class="block-header">
          <div class="block-title-wrap">
            <span class="drag-handle" title="Verplaats blok">⠿</span>
            <span class="block-emoji">${block.emoji||'🔗'}</span>
            <span class="block-title">${esc(block.title)}</span>
          </div>
          <div class="block-actions">
            <button class="btn-icon open-all" onclick="openAll('${block.id}',${ti})">Alles</button>
            <button class="btn-icon edit-btn" onclick="openEdit('${block.id}',${ti})">✎ Edit</button>
          </div>
        </div>
        <div class="block-links">
          ${links || '<div class="add-first-link">Geen links — klik Edit</div>'}
        </div>`;
      grid.appendChild(div);
    });
  });
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function openAll(blockId, tabIdx) {
  const block = data.tabs[tabIdx].blocks.find(b => b.id === blockId);
  if (!block || !block.links.length) return;
  block.links.forEach((l, i) => {
    setTimeout(() => { try { window.open(l.url, '_blank', 'noopener'); } catch {} }, i * 100);
  });
}

// ─── Add New Block ─────────────────────────────────────────────────────────
let editingTabIdx = null;
let editingBlockId = null;

function openAddBlock(tabIdx) {
  editingTabIdx = tabIdx;
  editingBlockId = null;
  document.getElementById('modal-title-txt').textContent = 'Nieuw blok';
  document.getElementById('edit-emoji').value = '🔗';
  document.getElementById('edit-title').value = '';
  document.getElementById('link-edit-list').innerHTML = '';
  document.getElementById('btn-delete-block').style.display = 'none';
  document.getElementById('edit-modal').classList.remove('hidden');
}

function openEdit(blockId, tabIdx) {
  const block = data.tabs[tabIdx].blocks.find(b => b.id === blockId);
  if (!block) return;
  editingTabIdx = tabIdx;
  editingBlockId = blockId;
  document.getElementById('modal-title-txt').textContent = 'Blok bewerken';
  document.getElementById('edit-emoji').value = block.emoji || '🔗';
  document.getElementById('edit-title').value = block.title;
  const list = document.getElementById('link-edit-list');
  list.innerHTML = '';
  block.links.forEach(l => addLinkRow(l.name, l.url));
  document.getElementById('btn-delete-block').style.display = 'block';
  document.getElementById('edit-modal').classList.remove('hidden');
}

function addLinkRow(name='', url='') {
  const list = document.getElementById('link-edit-list');
  const row = document.createElement('div');
  row.className = 'link-edit-item';
  row.innerHTML = `
    <input type="text" placeholder="Naam" value="${esc(name)}">
    <input type="url" placeholder="https://..." value="${esc(url)}">
    <button class="btn-del-link" title="Verwijder" onclick="this.parentElement.remove()">✕</button>`;
  list.appendChild(row);
}

function saveBlock() {
  const emoji = document.getElementById('edit-emoji').value.trim() || '🔗';
  const title = document.getElementById('edit-title').value.trim() || 'Nieuw blok';
  const rows = document.getElementById('link-edit-list').querySelectorAll('.link-edit-item');
  const links = [];
  rows.forEach(row => {
    const inputs = row.querySelectorAll('input');
    const name = inputs[0].value.trim();
    const url = inputs[1].value.trim();
    if (name && url) links.push({name, url});
  });
  if (editingBlockId) {
    const block = data.tabs[editingTabIdx].blocks.find(b => b.id === editingBlockId);
    if (block) { block.emoji = emoji; block.title = title; block.links = links; }
  } else {
    data.tabs[editingTabIdx].blocks.push({ id: uid(), emoji, title, links });
  }
  save(); renderBlocks(); closeModal();
}

function deleteBlock() {
  if (!editingBlockId) return;
  data.tabs[editingTabIdx].blocks = data.tabs[editingTabIdx].blocks.filter(b => b.id !== editingBlockId);
  save(); renderBlocks(); closeModal();
}

function closeModal() { document.getElementById('edit-modal').classList.add('hidden'); }

// Close on overlay click
document.getElementById('edit-modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });

// ─── Notes ────────────────────────────────────────────────────────────────
function renderNotes() {
  const grid = document.getElementById('notes-grid');
  grid.innerHTML = '';
  data.notes.forEach(note => {
    const card = document.createElement('div');
    card.className = 'note-card';
    const updated = new Date(note.updated).toLocaleString('nl-NL', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    card.innerHTML = `
      <div class="note-header">
        <input class="note-title-input" placeholder="Titel…" value="${esc(note.title)}" data-id="${note.id}" oninput="updateNote('${note.id}','title',this.value)">
      </div>
      <textarea class="note-textarea" placeholder="Schrijf hier…" data-id="${note.id}" oninput="updateNote('${note.id}','body',this.value)">${esc(note.body)}</textarea>
      <div class="note-footer">
        <span>Bijgewerkt: ${updated}</span>
        <button class="btn-del-note" onclick="deleteNote('${note.id}')">Verwijder</button>
      </div>`;
    grid.appendChild(card);
  });
}

function addNote() {
  data.notes.unshift({ id: uid(), title:'', body:'', updated: Date.now() });
  save(); renderNotes();
  setTimeout(() => document.querySelector('.note-title-input')?.focus(), 50);
}

function updateNote(id, field, val) {
  const note = data.notes.find(n => n.id === id);
  if (note) { note[field] = val; note.updated = Date.now(); save(); }
  // update timestamp
  const card = document.querySelector(`[data-id="${id}"]`)?.closest('.note-card');
  if (card) {
    const updated = new Date(Date.now()).toLocaleString('nl-NL', {day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
    const footer = card.querySelector('.note-footer span');
    if (footer) footer.textContent = 'Bijgewerkt: ' + updated;
  }
}

function deleteNote(id) {
  data.notes = data.notes.filter(n => n.id !== id);
  save(); renderNotes();
}

// ─── Clock ────────────────────────────────────────────────────────────────
const DAYS_NL = ['zondag','maandag','dinsdag','woensdag','donderdag','vrijdag','zaterdag'];
const MONTHS_NL = ['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];

function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const timeStr = `${h}:${m}:${s}`;
  const dateStr = `${DAYS_NL[now.getDay()]} ${now.getDate()} ${MONTHS_NL[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('clock-time').textContent = timeStr;
  document.getElementById('clock-date').textContent = dateStr;
  document.getElementById('datetime-mini').innerHTML = timeStr + '<br>' + `${now.getDate()} ${MONTHS_NL[now.getMonth()].slice(0,3)}`;
}
setInterval(updateClock, 1000);
updateClock();

// ─── Timer ────────────────────────────────────────────────────────────────
let timerSeconds = 0;
let timerInterval = null;
let timerCountdown = false;

function setTimer(minutes) {
  clearInterval(timerInterval); timerInterval = null;
  timerSeconds = minutes * 60;
  timerCountdown = true;
  document.getElementById('timer-start').classList.remove('active');
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(Math.abs(timerSeconds) / 60);
  const s = Math.abs(timerSeconds) % 60;
  document.getElementById('timer-display').textContent =
    (timerSeconds < 0 ? '-' : '') + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

document.getElementById('timer-start').addEventListener('click', () => {
  if (timerInterval) return;
  document.getElementById('timer-start').classList.add('active');
  timerInterval = setInterval(() => {
    if (timerCountdown) { timerSeconds--; } else { timerSeconds++; }
    if (timerSeconds === 0 && timerCountdown) { /* alarm could go here */ }
    updateTimerDisplay();
  }, 1000);
});

document.getElementById('timer-pause').addEventListener('click', () => {
  clearInterval(timerInterval); timerInterval = null;
  document.getElementById('timer-start').classList.remove('active');
});

document.getElementById('timer-reset').addEventListener('click', () => {
  clearInterval(timerInterval); timerInterval = null;
  timerSeconds = 0; timerCountdown = false;
  document.getElementById('timer-start').classList.remove('active');
  updateTimerDisplay();
});

updateTimerDisplay();

// ─── Calendar ─────────────────────────────────────────────────────────────
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth();

function renderCal() {
  const label = document.getElementById('cal-month-label');
  const grid = document.getElementById('cal-grid');
  label.textContent = `${MONTHS_NL[calMonth].slice(0,3)} ${calYear}`;
  grid.innerHTML = '';
  const dows = ['ma','di','wo','do','vr','za','zo'];
  dows.forEach(d => { const el = document.createElement('div'); el.className='cal-dow'; el.textContent=d; grid.appendChild(el); });
  const first = new Date(calYear, calMonth, 1);
  const startDow = (first.getDay() + 6) % 7; // Mon=0
  const totalDays = new Date(calYear, calMonth+1, 0).getDate();
  const today = new Date();
  for (let i = 0; i < startDow; i++) {
    const d = document.createElement('div');
    d.className = 'cal-day other-month';
    const prevDays = new Date(calYear, calMonth, 0).getDate();
    d.textContent = prevDays - startDow + 1 + i;
    grid.appendChild(d);
  }
  for (let d = 1; d <= totalDays; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day';
    if (d === today.getDate() && calMonth === today.getMonth() && calYear === today.getFullYear()) el.classList.add('today');
    el.textContent = d;
    grid.appendChild(el);
  }
  const remaining = 42 - startDow - totalDays;
  for (let d = 1; d <= remaining; d++) {
    const el = document.createElement('div');
    el.className = 'cal-day other-month';
    el.textContent = d;
    grid.appendChild(el);
  }
}

document.getElementById('cal-prev').addEventListener('click', () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCal(); });
document.getElementById('cal-next').addEventListener('click', () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCal(); });
renderCal();

// ─── Weather ──────────────────────────────────────────────────────────────
function weatherCodeToEmoji(code) {
  if (code === 0) return '☀️';
  if (code <= 2) return '⛅';
  if (code <= 3) return '☁️';
  if (code <= 48) return '🌫️';
  if (code <= 57) return '🌦️';
  if (code <= 67) return '🌧️';
  if (code <= 77) return '🌨️';
  if (code <= 82) return '🌦️';
  if (code <= 86) return '❄️';
  if (code <= 99) return '⛈️';
  return '🌡️';
}
function weatherCodeToDesc(code) {
  if (code === 0) return 'Helder';
  if (code <= 1) return 'Overwegend helder';
  if (code <= 2) return 'Gedeeltelijk bewolkt';
  if (code <= 3) return 'Bewolkt';
  if (code <= 45) return 'Mistig';
  if (code <= 48) return 'Rijpvorst mist';
  if (code <= 51) return 'Lichte motregen';
  if (code <= 55) return 'Motregen';
  if (code <= 57) return 'Koude motregen';
  if (code <= 61) return 'Lichte regen';
  if (code <= 65) return 'Regen';
  if (code <= 67) return 'Koude regen';
  if (code <= 71) return 'Lichte sneeuw';
  if (code <= 75) return 'Sneeuw';
  if (code <= 77) return 'Sneeuwkorrels';
  if (code <= 82) return 'Regenbuien';
  if (code <= 86) return 'Sneeuwbuien';
  if (code <= 99) return 'Onweer';
  return 'Onbekend';
}

async function loadWeather() {
  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, {timeout:8000})
    );
    const {latitude: lat, longitude: lon} = pos.coords;
    const [wxRes, geoRes] = await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&wind_speed_unit=kmh&timezone=auto`),
      fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`)
    ]);
    const wx = await wxRes.json();
    const geo = await geoRes.json();
    const c = wx.current;
    document.getElementById('weather-icon').textContent = weatherCodeToEmoji(c.weather_code);
    document.getElementById('weather-temp').textContent = Math.round(c.temperature_2m) + '°C';
    document.getElementById('weather-desc').textContent = weatherCodeToDesc(c.weather_code);
    const city = geo.address?.city || geo.address?.town || geo.address?.village || geo.address?.municipality || 'Jouw locatie';
    document.getElementById('weather-loc').textContent = city;
    document.getElementById('wh').textContent = c.relative_humidity_2m + '%';
    document.getElementById('ww').textContent = Math.round(c.wind_speed_10m) + ' km/h';
    document.getElementById('wf').textContent = Math.round(c.apparent_temperature) + '°C';
    document.getElementById('weather-loading').style.display = 'none';
    document.getElementById('weather-content').style.display = 'block';
  } catch (e) {
    document.getElementById('weather-loading').style.display = 'none';
    const err = document.getElementById('weather-error');
    err.style.display = 'block';
    if (e.code === 1) err.textContent = 'Locatietoegang geweigerd. Sta locatie toe voor weerbericht.';
    else err.textContent = 'Kon weerdata niet laden.';
  }
}
loadWeather();

// ─── Init ──────────────────────────────────────────────────────────────────
renderBlocks();
renderNotes();

// ─── Drag & Drop (SortableJS) ──────────────────────────────────────────────
function initSortable() {
  [0, 1].forEach(ti => {
    const grid = document.getElementById('grid-' + ti);
    if (!grid || grid._sortable) return;
    grid._sortable = Sortable.create(grid, {
      handle: '.drag-handle',
      animation: 160,
      ghostClass: 'sortable-ghost',
      chosenClass: 'sortable-chosen',
      dragClass: 'sortable-drag',
      onStart: () => grid.classList.add('drag-active'),
      onEnd: (evt) => {
        grid.classList.remove('drag-active');
        const blocks = data.tabs[ti].blocks;
        const moved = blocks.splice(evt.oldIndex, 1)[0];
        blocks.splice(evt.newIndex, 0, moved);
        save();
        // re-sync dataset ids (no full re-render to preserve sortable)
      }
    });
  });
}

// Re-init sortable after each renderBlocks (grids are rebuilt)
const _origRenderBlocks = renderBlocks;
window.renderBlocks = function() {
  // remove old sortable instances so they can be recreated
  [0,1].forEach(ti => {
    const grid = document.getElementById('grid-' + ti);
    if (grid && grid._sortable) { grid._sortable.destroy(); grid._sortable = null; }
  });
  _origRenderBlocks();
  initSortable();
};
// Already called above, so init now
initSortable();
</script>
</body>
